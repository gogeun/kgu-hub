<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGU 캠퍼스 허브 - 경기대 통합 링크</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <section class="hero-section" aria-labelledby="header-title">
        <div class="hero-content">
            <h1 id="header-title">KGU 캠퍼스 허브</h1>
            <p>자주 가는 사이트를 한 곳에</p>
        </div>
    </section>

    <div class="wrap">
        <header>
            <h2 class="logo" style="margin:0; font-size:1.5em;">KGU Hub</h2>

            <nav class="gnb" aria-label="메인 네비게이션">
                <ul>
                    <li><a href="#">홈</a></li>
                    <li><a href="#">학사공지</a></li>
                    <li><a href="#">자유게시판</a></li>
                </ul>
            </nav>
        </header>

        <div class="main-container">
            <aside class="left-sidebar">
                <h3>메뉴</h3>
                <nav aria-label="카테고리 메뉴">
                    <ul id="category-list">
                        <li><a href="#" id="menu-all" class="active">전체보기</a></li>
                        <li><a href="#" id="menu-favorite">⭐ 내 즐겨찾기</a></li>
                        <li><a href="#" id="menu-admin">행정/학사</a></li>
                        <li><a href="#" id="menu-lib">도서관</a></li>

                        <li style="margin-top: 20px;">
                            <button id="btn-open-modal"
                                style="width:100%; padding:10px; background:#3498db; color:#fff; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">
                                + 새 사이트 추가
                            </button>
                        </li>
                    </ul>
                </nav>
            </aside>

            <main id="card-area" aria-label="사이트 링크 목록">
            </main>
        </div>

        <footer>
            <p>&copy; 2026 KGU Campus Hub Project. All rights reserved.</p>
        </footer>
    </div>

    <button id="top-btn" title="맨 위로 가기" aria-label="맨 위로 가기">▲ Top</button>

    <script src="script.js"></script>

    <div id="add-modal" class="modal-overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
        <div class="modal-content">
            <h3 id="modal-title">새 사이트 추가하기</h3>
            <label for="custom-title" style="display:none;">사이트 이름</label>
            <input type="text" id="custom-title" placeholder="사이트 이름 (예: 구글)">

            <label for="custom-url" style="display:none;">URL 링크</label>
            <input type="text" id="custom-url" placeholder="URL 링크 (https://...)">

            <div class="modal-btns">
                <button id="btn-save-site" class="save-btn">저장</button>
                <button id="btn-close-modal" class="close-btn">취소</button>
            </div>
        </div>
    </div>
</body>

</html>
